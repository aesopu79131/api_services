# AWS CodeDeploy spec: deploy Docker image to EC2
# App content is the CodeBuild artifact: appspec.yml, scripts/, image.txt
version: 0.0
os: linux
files:
  - source: /
    destination: /opt/dragon-live
permissions:
  - object: /opt/dragon-live
    owner: root
    group: root
    mode: 755
hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 120
      runas: root
