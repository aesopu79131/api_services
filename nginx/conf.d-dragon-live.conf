# Copy this file to /etc/nginx/conf.d/dragon-live.conf on EC2
# Do NOT put this content into /etc/nginx/nginx.conf (server must be inside http {}).

server {
    listen 80;
    server_name dragon-nip.live www.dragon-nip.live;

    access_log /var/log/nginx/dragon-live.access.log;
    error_log  /var/log/nginx/dragon-live.error.log;
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }
}
